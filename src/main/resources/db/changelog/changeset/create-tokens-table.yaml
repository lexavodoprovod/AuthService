databaseChangeLog:
  - changeSet:
      id: create-tokens
      author: Nikita
      changes:
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: access_token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: is_logged_out
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tokens_user
                    referencedTableName: credentials
                    referencedColumnNames: id
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

